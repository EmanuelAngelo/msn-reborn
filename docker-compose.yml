services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: local
      DEBUG: "True"
      REDIS_URL: redis://redis:6379/0
      SQLITE_PATH: /app/data/db.sqlite3
      ALLOWED_HOSTS: 127.0.0.1,localhost,backend,frontend
      FRONTEND_URL: http://127.0.0.1:8081
      SPOTIFY_REDIRECT_URI: http://127.0.0.1:8010/api/spotify/callback/
      CORS_ALLOWED_ORIGINS: http://127.0.0.1:8081,http://localhost:8081,http://127.0.0.1:5173,http://localhost:5173
    volumes:
      - sqlite_data:/app/data
      - media_data:/app/media
    ports:
      - "8010:8000"
    depends_on:
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
        VITE_ENABLE_WEBSOCKETS: "true"
    restart: unless-stopped
    ports:
      - "8081:80"
    depends_on:
      - backend

volumes:
  sqlite_data:
  media_data:
